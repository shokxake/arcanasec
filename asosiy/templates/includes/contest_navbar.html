{% load static %}

<nav class="navbar navbar-expand-lg navbar-dark navbar-mystic sticky-top contest-navbar-mystic">
    <div class="container">
        <!-- Brand -->
        <a class="navbar-brand" href="{% url 'contest_detail' contest.id %}">
            <img src="{% static 'images/logo.png' %}" alt="ArcanaSec Logo" class="brand-logo">
            <span>ARCANASEC</span>
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#contestNavbarNav" aria-controls="contestNavbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar Content -->
        <div class="collapse navbar-collapse" id="contestNavbarNav">
            <!-- Center Menu -->
            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'contest_detail' %}active{% endif %}"
                       href="{% url 'contest_detail' contest.id %}">
                        <i class="bi bi-moon-stars me-1"></i> Overview
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'contest_challenges' %}active{% endif %}"
                       href="{% url 'contest_challenges' contest.id %}">
                        <i class="bi bi-grid-3x3-gap me-1"></i> Challenges
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'contest_scoreboard' %}active{% endif %}"
                       href="{% url 'contest_scoreboard' contest.id %}">
                        <i class="bi bi-trophy-fill me-1"></i> Scoreboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'contest_participants' %}active{% endif %}"
                       href="{% url 'contest_participants' contest.id %}">
                        <i class="bi bi-people-fill me-1"></i> Users
                    </a>
                </li>
            </ul>

            <!-- Right Menu -->
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link contest-back-link" href="{% url 'contest_list' %}">
                        <i class="bi bi-arrow-left-circle me-1"></i> Back to Contests
                    </a>
                </li>

                {% if user.is_authenticated %}
                <li class="nav-item dropdown ms-lg-2">
                    <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="contestUserDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <img src="{% if user.profil.img %}{{ user.profil.img.url }}{% else %}{% static 'images/arcana.jpg' %}{% endif %}" class="nav-profile-img me-2">
                        <span class="small">{{ user.username|upper }}</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="{% url 'profil_ozgartirish' %}">
                                <i class="bi bi-person-gear me-2"></i>Profile
                            </a>
                        </li>
                        <li><hr class="dropdown-divider border-secondary"></li>
                        <li>
                            <form method="post" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<style>
    .contest-navbar-mystic {
        background:
            linear-gradient(180deg, rgba(15, 15, 15, 0.96), rgba(10, 10, 10, 0.96)) !important;
        border-bottom: 2px solid var(--gold);
        box-shadow:
            0 5px 25px rgba(0, 0, 0, 0.85),
            0 0 20px rgba(212, 175, 55, 0.05);
        z-index: 1050;
    }

    .contest-navbar-mystic .navbar-brand {
        display: flex;
        align-items: center;
        font-family: 'Cinzel', serif;
        font-weight: 700;
        letter-spacing: 3px;
        color: var(--gold) !important;
        text-shadow: 0 0 10px var(--gold-glow);
    }

    .contest-navbar-mystic .brand-logo {
        height: 45px;
        width: auto;
        margin-right: 12px;
        filter: drop-shadow(0 0 5px var(--gold-glow));
        transition: 0.3s ease;
    }

    .contest-navbar-mystic .nav-link {
        font-family: 'Cinzel', serif;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 0.78rem;
        color: var(--text-light) !important;
        transition: 0.3s ease;
        padding: 0.55rem 0.95rem !important;
        border-radius: 6px;
    }

    .contest-navbar-mystic .nav-link:hover {
        color: var(--gold) !important;
        text-shadow: 0 0 8px var(--gold);
        background: rgba(212, 175, 55, 0.05);
    }

    .contest-navbar-mystic .nav-link.active {
        color: var(--gold) !important;
        background: rgba(212, 175, 55, 0.08);
        border: 1px solid rgba(212, 175, 55, 0.18);
        box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.04);
    }

    .contest-back-link {
        border: 1px solid rgba(212, 175, 55, 0.18);
        background: rgba(212, 175, 55, 0.03);
    }

    .contest-back-link:hover {
        background: rgba(212, 175, 55, 0.10) !important;
    }

    .contest-navbar-mystic .nav-profile-img {
        width: 32px;
        height: 32px;
        border: 1px solid var(--gold);
        object-fit: cover;
        box-shadow: 0 0 5px var(--gold-glow);
        border-radius: 50%;
    }

    .contest-navbar-mystic .dropdown-menu {
        background-color: var(--card-bg);
        border: 1px solid var(--gold);
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .contest-navbar-mystic .dropdown-item {
        color: var(--text-light);
        font-family: 'Cinzel', serif;
        font-size: 0.75rem;
        letter-spacing: 1px;
        transition: 0.3s;
    }

    .contest-navbar-mystic .dropdown-item:hover {
        background-color: rgba(212, 175, 55, 0.1);
        color: var(--gold);
    }
</style>
