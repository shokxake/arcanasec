<!-- Contest Navbar -->
<nav class="contest-nav py-3 mb-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            
            <!-- Chap tomon: Musobaqa nomi va Status -->
            <div class="d-flex align-items-center">
                <div class="contest-icon-box me-3">
                    <i class="bi bi-terminal-fill text-cyan fs-4"></i>
                </div>
                <div>
                    <h5 class="text-white mb-0 font-cinzel fw-bold" style="letter-spacing: 2px;">
                        {{ contest.nomi|upper }}
                    </h5>
                    <small class="text-muted d-block" style="font-size: 0.7rem;">
                        <span class="status-dot animate-flicker"></span> MISSION IN PROGRESS
                    </small>
                </div>
            </div>

            <!-- Markaz: Navigatsiya tugmalari -->
            <div class="contest-menu-links d-flex gap-2">
                <a href="{% url 'contest_challenges' contest.id %}" 
                   class="nav-link-custom {% if request.resolver_match.url_name == 'contest_challenges' %}active{% endif %}">
                    <i class="bi bi-grid-3x3-gap me-2"></i> CHALLENGES
                </a>
                
                <a href="{% url 'contest_scoreboard' contest.id %}" 
                   class="nav-link-custom {% if request.resolver_match.url_name == 'contest_scoreboard' %}active{% endif %}">
                    <i class="bi bi-trophy me-2"></i> SCOREBOARD
                </a>
                
                <a href="{% url 'contest_participants' contest.id %}" 
                   class="nav-link-custom {% if request.resolver_match.url_name == 'contest_participants' %}active{% endif %}">
                    <i class="bi bi-people me-2"></i> USERS
                </a>
            </div>

            <!-- O'ng tomon: Chiqish yoki Qaytish -->
            <div class="d-flex align-items-center">
                <a href="{% url 'contest_list' %}" class="btn-back-to-hq">
                    <i class="bi bi-arrow-left-circle me-1"></i> BACK TO HQ
                </a>
            </div>
        </div>
    </div>
</nav>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    .contest-nav {
        background: #111418;
        border-bottom: 1px solid #45a29e;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        font-family: 'Share Tech Mono', monospace;
    }

    .contest-icon-box {
        background: rgba(102, 252, 241, 0.1);
        border: 1px solid #66fcf1;
        padding: 5px 12px;
        border-radius: 5px;
    }

    .text-cyan { color: #66fcf1; }

    /* Navigatsiya linklari */
    .nav-link-custom {
        color: #c5c6c7;
        text-decoration: none;
        padding: 8px 20px;
        border-radius: 4px;
        font-size: 0.9rem;
        transition: all 0.3s ease;
        border: 1px solid transparent;
        letter-spacing: 1px;
    }

    .nav-link-custom:hover {
        color: #66fcf1;
        background: rgba(102, 252, 241, 0.05);
    }

    .nav-link-custom.active {
        color: #0b0c10;
        background: #66fcf1;
        border-color: #66fcf1;
        box-shadow: 0 0 15px rgba(102, 252, 241, 0.3);
        font-weight: bold;
    }

    /* Back to HQ tugmasi */
    .btn-back-to-hq {
        color: #45a29e;
        text-decoration: none;
        font-size: 0.85rem;
        border: 1px dashed #45a29e;
        padding: 6px 15px;
        transition: 0.3s;
    }

    .btn-back-to-hq:hover {
        background: rgba(69, 162, 158, 0.1);
        color: #66fcf1;
        border-style: solid;
    }

    /* Status dot animatsiyasi */
    .status-dot {
        height: 8px;
        width: 8px;
        background-color: #28a745;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
        box-shadow: 0 0 8px #28a745;
    }

    .animate-flicker {
        animation: flicker-green 1s infinite alternate;
    }

    @keyframes flicker-green {
        from { opacity: 0.4; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1.1); }
    }

    /* Mobile moslashuvchanlik */
    @media (max-width: 768px) {
        .contest-menu-links {
            order: 3;
            width: 100%;
            justify-content: center;
            margin-top: 10px;
        }
    }
</style>
