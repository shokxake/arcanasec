{% extends 'asosiy/asosiy_sahifa.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}

<div class="arcana-edit-wrapper py-5">
    <div class="container">

        <!-- Header Section -->
        <div class="arcana-header text-center mb-5">
            <div class="arcana-label">ESSENCE MODIFICATION</div>
            <h1 class="arcana-title">RESHAPE REALITY</h1>
            <div class="arcana-divider-center"></div>
            <p class="arcana-subtitle">Alter your digital signature within the arcane records.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <!-- Edit Form Card -->
                <div class="arcana-card edit-main-card">
                    <div class="card-inner">
                        <div class="form-header text-center mb-4">
                            <i class="bi bi-person-gear arcana-icon"></i>
                        </div>

                        <form method="post" enctype="multipart/form-data" class="arcana-form">
                            {% csrf_token %}

                            <div class="crispy-container">
                                {{ form|crispy }}
                            </div>

                            <div class="profile-actions mt-5">
                                <button type="submit" class="arcana-btn w-100">
                                    REWRITE DESTINY
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Decorative Corners -->
                    <div class="corner tl"></div>
                    <div class="corner tr"></div>
                    <div class="corner bl"></div>
                    <div class="corner br"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');

.arcana-edit-wrapper {
    min-height: 100vh;
    font-family: 'Cinzel', serif;
    color: #e0e0e0;
    background: transparent;
}

/* Header Styling */
.arcana-label {
    font-size: 0.8rem;
    letter-spacing: 5px;
    color: #d4af37;
    margin-bottom: 10px;
    opacity: 0.8;
}
.arcana-title {
    font-weight: 900;
    font-size: 2.5rem;
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
}
.arcana-divider-center {
    width: 100px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #d4af37, transparent);
    margin: 20px auto;
}
.arcana-subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: #999;
}

/* Card Design */
.arcana-card {
    position: relative;
    background: rgba(15, 15, 15, 0.7);
    border: 1px solid rgba(212, 175, 55, 0.2);
    padding: 40px;
    backdrop-filter: blur(15px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    border-radius: 4px;
}

.arcana-icon {
    font-size: 3rem;
    color: #d4af37;
    filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
}

/* Form Styling */
.arcana-form label {
    color: #d4af37 !important;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
}
.arcana-form input, 
.arcana-form select, 
.arcana-form textarea,
.arcana-form input[type="file"] {
    background: rgba(255, 255, 255, 0.03) !important;
    border: 1px solid rgba(212, 175, 55, 0.2) !important;
    color: #fff !important;
    border-radius: 2px !important;
    padding: 12px !important;
    transition: 0.3s;
}
.arcana-form input:focus, 
.arcana-form select:focus {
    background: rgba(212, 175, 55, 0.05) !important;
    border-color: #d4af37 !important;
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.15) !important;
    outline: none;
}

/* Crispy help text & errors */
.invalid-feedback {
    color: #ff4d4d !important;
    font-size: 0.7rem;
    font-family: 'Playfair Display', serif;
}
.text-muted {
    color: #666 !important;
    font-size: 0.7rem;
}

/* Custom Button */
.arcana-btn {
    position: relative;
    display: inline-block;
    padding: 15px;
    color: #d4af37;
    text-decoration: none;
    border: 1px solid #d4af37;
    background: transparent;
    transition: 0.4s;
    overflow: hidden;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
}
.arcana-btn:hover {
    background: #d4af37;
    color: #000;
    box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
}

/* Decorative Corners */
.corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border: 2px solid #d4af37;
}
.tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
.tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
.bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
.br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

@media (max-width: 576px) {
    .arcana-title { font-size: 1.8rem; }
    .arcana-card { padding: 25px; }
}

</style>

{% endblock %}
